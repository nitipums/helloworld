name: Deploy SET50 Fetcher Job

on:
  push:
    branches:
      - main
    paths:
      - 'fetcher/**'

env:
  JOB:    set50-fetcher
  REGION: asia-southeast1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy fetcher job to Cloud Run
        run: |
          gcloud run jobs deploy $JOB \
            --source ./fetcher \
            --region $REGION \
            --task-timeout 600 \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},SETTRADE_APP_ID=${{ secrets.SETTRADE_APP_ID }},SETTRADE_APP_SECRET=${{ secrets.SETTRADE_APP_SECRET }},SETTRADE_BROKER_ID=${{ secrets.SETTRADE_BROKER_ID }},SETTRADE_APP_CODE=${{ secrets.SETTRADE_APP_CODE }}" \
            --quiet

      - name: Create Cloud Scheduler trigger (if not exists)
        run: |
          gcloud scheduler jobs create http $JOB-daily \
            --schedule="0 18 * * 1-5" \
            --time-zone="Asia/Bangkok" \
            --uri="https://$REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${{ secrets.GCP_PROJECT_ID }}/jobs/$JOB:run" \
            --oauth-service-account-email=${{ secrets.GCP_SA_EMAIL }} \
            --location=$REGION \
            --quiet 2>/dev/null || echo "Scheduler already exists, skipping."
